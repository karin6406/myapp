<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳與預算管理系統 Pro Max V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
            <div class="flex gap-2">
                <button onclick="openModal('settingsModal')" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-700 transition">⚙️ 設定</button>
                <button onclick="openModal('assetsModal')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">🏦 資產</button>
            </div>
            <h1 class="text-xl font-bold text-indigo-800">📊 記帳系統 V13</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <!-- ⚡ 快速記帳 -->
                <div class="bg-white p-5 rounded-xl shadow-md border border-yellow-200 bg-gradient-to-br from-yellow-50 to-white">
                    <h2 class="text-base font-bold mb-3 text-yellow-700">⚡ 快速記帳 (撳即記)</h2>
                    <div id="shortcutsContainer" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- 每日記帳 -->
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 text-gray-700">✍️ 手動記帳</h2>
                    <form id="transactionForm" onsubmit="addTransaction(event)" class="space-y-3 text-sm">
                        <input type="date" id="txDate" class="w-full p-2 border rounded" required onchange="updateAllViews()">
                        <div class="flex gap-4">
                            <label><input type="radio" name="txType" value="expense" checked onchange="toggleTxTypeView()"> 支出</label>
                            <label><input type="radio" name="txType" value="income" onchange="toggleTxTypeView()"> 收入</label>
                        </div>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="txIncludeBudget" checked> 計入預算
                        </label>
                        <input type="number" id="txAmount" placeholder="金額" class="w-full p-2 border rounded" required>
                        <select id="txCategory" class="w-full p-2 border rounded"></select>
                        <select id="txMethod" class="w-full p-2 border rounded"></select>
                        <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-lg font-bold">新增紀錄</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                    <h2 class="text-lg font-bold mb-4">📅 支出月歷</h2>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定 Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-xl w-full max-w-3xl max-h-[80vh] overflow-y-auto p-6">
            <h3 class="text-lg font-bold mb-4">設定</h3>
            <div id="shortcutsSettingsSection" class="space-y-4">
                <div class="flex justify-between items-center">
                    <h4 class="font-bold text-yellow-700">⚡ 快速記帳捷徑</h4>
                    <button onclick="addNewShortcut()" class="bg-yellow-100 px-2 py-1 rounded text-xs">+ 新增</button>
                </div>
                <table class="w-full text-xs">
                    <thead><tr class="text-gray-500 border-b"><th>名稱</th><th>金額</th><th>計預算?</th><th>操作</th></tr></thead>
                    <tbody id="shortcutsTableBody"></tbody>
                </table>
            </div>
            <button onclick="closeModal('settingsModal')" class="mt-6 bg-gray-800 text-white w-full py-2 rounded">完成</button>
        </div>
    </div>

    <script>
        let settings = JSON.parse(localStorage.getItem('v13_settings')) || { shortcuts: [], categories: [{name: "交通", budget: 1200}], assets: [{id: "a1", name: "現金", value: 10000}] };
        let transactions = JSON.parse(localStorage.getItem('v13_txs')) || [];

        function save() {
            localStorage.setItem('v13_settings', JSON.stringify(settings));
            localStorage.setItem('v13_txs', JSON.stringify(transactions));
        }

        function renderShortcuts() {
            const container = document.getElementById('shortcutsContainer');
            container.innerHTML = '';
            settings.shortcuts.forEach((sc, idx) => {
                container.innerHTML += `<button onclick="quickAdd(${idx})" class="px-3 py-1 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-bold shadow-sm">${sc.name} ($${sc.amount})</button>`;
            });
        }

        function quickAdd(idx) {
            const sc = settings.shortcuts[idx];
            const tx = {
                id: 'tx_' + Date.now(),
                date: document.getElementById('txDate').value || new Date().toISOString().split('T')[0],
                type: 'expense',
                amount: sc.amount,
                category: sc.category,
                methodName: settings.assets[0].name,
                includeInBudget: sc.includeInBudget
            };
            transactions.push(tx);
            save();
            alert("已快速記帳: " + sc.name);
            updateAllViews();
        }

        function addTransaction(e) {
            e.preventDefault();
            const tx = {
                id: 'tx_' + Date.now(),
                date: document.getElementById('txDate').value,
                type: document.querySelector('input[name="txType"]:checked').value,
                amount: parseFloat(document.getElementById('txAmount').value),
                category: document.getElementById('txCategory').value,
                includeInBudget: document.getElementById('txIncludeBudget').checked
            };
            transactions.push(tx);
            save();
            updateAllViews();
        }

        function renderSettings() {
            const tbody = document.getElementById('shortcutsTableBody');
            tbody.innerHTML = '';
            settings.shortcuts.forEach((sc, idx) => {
                tbody.innerHTML += `
                    <tr>
                        <td><input type="text" value="${sc.name}" class="border p-1" onchange="settings.shortcuts[${idx}].name=this.value; save()"></td>
                        <td><input type="number" value="${sc.amount}" class="border p-1" onchange="settings.shortcuts[${idx}].amount=parseFloat(this.value); save()"></td>
                        <td><input type="checkbox" ${sc.includeInBudget ? 'checked' : ''} onchange="settings.shortcuts[${idx}].includeInBudget=this.checked; save()"></td>
                        <td><button onclick="settings.shortcuts.splice(${idx},1); save(); renderSettings()" class="text-red-500">刪</button></td>
                    </tr>`;
            });
        }

        function addNewShortcut() {
            settings.shortcuts.push({name: "新項目", amount: 0, category: "交通", includeInBudget: true});
            save(); renderSettings();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); renderSettings(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); renderShortcuts(); }

        function updateAllViews() { renderShortcuts(); }
        
        window.onload = () => {
            document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            renderShortcuts();
        };
    </script>
</body>
</html>
